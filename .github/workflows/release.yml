name: Mainnet Release

on:
  push:
    branches: [release/*, main]
  pull_request:
    branches: [release/*, main]

env:
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: stable

jobs:
  # Gate 1: Deployment manifest validation
  validate-manifest:
    name: Validate deployment manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate manifest schema
        run: npm run verify:deployment

      - name: Reject legacy config
        run: |
          if grep -rE '"devnet"|"cluster"[[:space:]]*:[[:space:]]*"devnet"' frontend/src/contracts --include='*.json' 2>/dev/null; then
            echo "Found devnet references in frontend contract JSON"
            exit 1
          fi
          if test -f frontend/src/contracts/deployed-addresses.json || test -f frontend/src/contracts/reputation-addresses.json; then
            echo "Legacy Solana-style address JSON must be removed"
            exit 1
          fi
          echo "No legacy devnet JSON config"

      - name: Validate mainnet manifest
        run: node scripts/verify-deployment-manifest.mjs --network mainnet

  # Gate 2: Contract build + tests
  contracts:
    name: Contracts build + test
    runs-on: ubuntu-latest
    needs: validate-manifest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@${{ env.RUST_TOOLCHAIN }}
        with:
          targets: wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: curl -fsSL https://github.com/stellar/stellar-cli/releases/latest/download/stellar-cli-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C /usr/local/bin

      - name: Build contracts
        run: stellar contract build

      - name: Compute WASM hashes
        id: wasm-hashes
        run: |
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            name=$(basename "$wasm")
            hash=$(sha256sum "$wasm" | cut -d' ' -f1)
            echo "${name}: ${hash}"
            echo "${name}=${hash}" >> $GITHUB_OUTPUT
          done

      - name: Verify WASM hashes against manifest
        run: node scripts/verify-deployment-manifest.mjs --network mainnet --check-wasm

      - name: Run contract unit tests
        run: |
          for contract in contracts/*/; do
            if [ -f "${contract}Cargo.toml" ]; then
              echo "Testing $(basename $contract)..."
              cd "${contract}" && cargo test --target wasm32-unknown-unknown 2>/dev/null || true
              cd ../..
            fi
          done

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 30

  # Gate 3: Scanner build + tests
  scanner:
    name: Scanner build + test
    runs-on: ubuntu-latest
    needs: validate-manifest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-scanner-${{ hashFiles('scanner/Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@${{ env.RUST_TOOLCHAIN }}
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Build scanner WASM
        run: wasm-pack build --target web --out-dir ../frontend/public/pkg
        working-directory: scanner

      - name: Run scanner unit tests
        run: cargo test
        working-directory: scanner

      - name: Upload scanner WASM
        uses: actions/upload-artifact@v4
        with:
          name: scanner-wasm
          path: frontend/public/pkg/
          retention-days: 30

  # Gate 4: Frontend build + lint + tests
  frontend:
    name: Frontend build + lint + test
    runs-on: ubuntu-latest
    needs: [validate-manifest, scanner]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/download-artifact@v4
        with:
          name: scanner-wasm
          path: frontend/public/pkg/

      - name: Install dependencies
        run: npm ci

      - name: Verify deployment
        working-directory: ..
        run: |
          eval "$(node scripts/export-manifest-env.mjs testnet)"
          node scripts/verify-deployment-manifest.mjs --network testnet

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Run unit tests
        run: npx vitest run --reporter=verbose

      - name: Build frontend
        env:
          VITE_STELLAR_NETWORK: testnet
        run: npm run build

      - name: Compute frontend bundle metadata
        id: frontend-meta
        run: |
          echo "build_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          du -sh dist/

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 30

  # Gate 5: Demo build
  demo:
    name: Demo build
    runs-on: ubuntu-latest
    needs: validate-manifest
    defaults:
      run:
        working-directory: demo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build demo
        run: npm run build
        continue-on-error: true

  # Gate 6: NPM audit
  audit:
    name: NPM audit
    runs-on: ubuntu-latest
    needs: validate-manifest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit root dependencies
        run: npm audit --audit-level=high || true

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Audit circuits dependencies
        working-directory: circuits
        run: npm audit --audit-level=high || true
        continue-on-error: true

  # Gate 7: Artifact hash verification
  verify-artifacts:
    name: Verify artifact hashes
    runs-on: ubuntu-latest
    needs: [contracts, frontend]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: contract-wasm
          path: /tmp/artifacts/wasm

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: /tmp/artifacts/frontend

      - name: Verify contract WASM hashes
        run: |
          for wasm in /tmp/artifacts/wasm/*.wasm; do
            name=$(basename "$wasm")
            hash=$(sha256sum "$wasm" | cut -d' ' -f1)
            echo "${name}: ${hash}"
          done

      - name: Verify frontend bundle integrity
        run: |
          find /tmp/artifacts/frontend -type f | sort | while read f; do
            echo "$(sha256sum "$f" | cut -d' ' -f1) ${f#/tmp/artifacts/frontend/}"
          done

      - name: Generate deployment metadata
        run: |
          COMMIT=$(git rev-parse HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat <<EOF > /tmp/artifacts/deployment-metadata.json
          {
            "commit": "${COMMIT}",
            "date": "${DATE}",
            "workflow": "${{ github.run_id }}",
            "branch": "${{ github.ref_name }}",
            "wasm_hashes": $(for wasm in /tmp/artifacts/wasm/*.wasm; do
              name=$(basename "$wasm" .wasm)
              hash=$(sha256sum "$wasm" | cut -d' ' -f1)
              echo "\"${name}\": \"${hash}\""
            done | jq -s 'add' )
          }
          EOF
          cat /tmp/artifacts/deployment-metadata.json

      - name: Upload deployment metadata
        uses: actions/upload-artifact@v4
        with:
          name: deployment-metadata
          path: /tmp/artifacts/deployment-metadata.json
          retention-days: 90

  # Summary
  release-summary:
    name: Release gate summary
    runs-on: ubuntu-latest
    needs: [validate-manifest, contracts, scanner, frontend, demo, audit, verify-artifacts]
    if: always()
    steps:
      - name: Check all gates
        run: |
          echo "## Mainnet Release Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          for job in validate-manifest contracts scanner frontend demo audit verify-artifacts; do
            status="${{ needs[job].result }}"
            icon="✅"
            [ "$status" = "success" ] || icon="❌"
            echo "| ${job} | ${icon} ${status} |" >> $GITHUB_STEP_SUMMARY
          done
