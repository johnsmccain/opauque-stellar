name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify-deployment-manifest:
    name: Verify deployment manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate manifests (schema, no legacy Solana/devnet)
        run: npm run verify:deployment

      - name: Reject devnet / Solana address patterns in production config
        run: |
          if grep -rE '"devnet"|"cluster"[[:space:]]*:[[:space:]]*"devnet"' frontend/src/contracts --include='*.json' 2>/dev/null; then
            echo "Found devnet references in frontend contract JSON"
            exit 1
          fi
          if test -f frontend/src/contracts/deployed-addresses.json || test -f frontend/src/contracts/reputation-addresses.json; then
            echo "Legacy Solana-style address JSON must be removed"
            exit 1
          fi
          echo "No legacy devnet JSON config in frontend/src/contracts"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: verify-deployment-manifest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify frontend env matches manifest
        working-directory: ..
        run: |
          eval "$(node scripts/export-manifest-env.mjs testnet)"
          node scripts/verify-deployment-manifest.mjs --network testnet
          cd frontend && npm run verify:deployment

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Typecheck and build
        env:
          VITE_STELLAR_NETWORK: testnet
        run: npm run build

      - name: Run unit tests
        run: npx vitest run --reporter=verbose

  contracts:
    name: Soroban contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: curl -fsSL https://github.com/stellar/stellar-cli/releases/latest/download/stellar-cli-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C /usr/local/bin

      - name: Build contracts
        run: stellar contract build
        continue-on-error: true

      - name: Verify WASM hashes when build succeeds
        if: success()
        run: node scripts/verify-deployment-manifest.mjs --network testnet --check-wasm
        continue-on-error: true
